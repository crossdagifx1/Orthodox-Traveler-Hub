kind = "web"
previewPath = "/"
title = "Guzo - Orthodox App"
version = "1.0.0"
id = "artifacts/guzo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25436

[services.development]
run = "pnpm --filter @workspace/guzo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/guzo", "run", "build" ]
publicDir = "artifacts/guzo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25436"
BASE_PATH = "/"
