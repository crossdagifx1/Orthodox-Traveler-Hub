openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Guzo Orthodox API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: destinations
  - name: churches
  - name: marketplace
  - name: mezmurs
  - name: news
  - name: admin
  - name: auth
  - name: stats
  - name: qa
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user (or null if not logged in)
      responses:
        "200":
          description: Current user or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaybeUser"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in or sign up with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                required: [error]
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Aggregated counts across the platform
      responses:
        "200":
          description: Overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

  /destinations:
    get:
      operationId: listDestinations
      tags: [destinations]
      summary: List all spiritual destinations
      parameters:
        - in: query
          name: region
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
      responses:
        "200":
          description: Destinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Destination"
    post:
      operationId: createDestination
      tags: [destinations, admin]
      summary: Create a destination (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDestinationBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"
  /destinations/featured:
    get:
      operationId: listFeaturedDestinations
      tags: [destinations]
      summary: Featured / pinned destinations
      responses:
        "200":
          description: Featured destinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Destination"
  /destinations/{id}:
    get:
      operationId: getDestination
      tags: [destinations]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Destination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"
    patch:
      operationId: updateDestination
      tags: [destinations, admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDestinationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"
    delete:
      operationId: deleteDestination
      tags: [destinations, admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /churches:
    get:
      operationId: listChurches
      tags: [churches]
      summary: List churches with map coordinates
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: country
          schema: { type: string }
      responses:
        "200":
          description: Churches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Church"
    post:
      operationId: createChurch
      tags: [churches, admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChurchBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Church"
  /churches/{id}:
    get:
      operationId: getChurch
      tags: [churches]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Church
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Church"
    patch:
      operationId: updateChurch
      tags: [churches, admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChurchBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Church"
    delete:
      operationId: deleteChurch
      tags: [churches, admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /marketplace/items:
    get:
      operationId: listMarketplaceItems
      tags: [marketplace]
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceItem"
    post:
      operationId: createMarketplaceItem
      tags: [marketplace]
      summary: Create a listing (login required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMarketplaceItemBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceItem"
  /marketplace/items/featured:
    get:
      operationId: listFeaturedItems
      tags: [marketplace]
      responses:
        "200":
          description: Featured items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceItem"
  /marketplace/items/{id}:
    get:
      operationId: getMarketplaceItem
      tags: [marketplace]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceItem"
    patch:
      operationId: updateMarketplaceItem
      tags: [marketplace, admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMarketplaceItemBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceItem"
    delete:
      operationId: deleteMarketplaceItem
      tags: [marketplace, admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /mezmurs:
    get:
      operationId: listMezmurs
      tags: [mezmurs]
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
      responses:
        "200":
          description: Mezmurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Mezmur"
    post:
      operationId: createMezmur
      tags: [mezmurs, admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMezmurBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mezmur"
  /mezmurs/trending:
    get:
      operationId: listTrendingMezmurs
      tags: [mezmurs]
      responses:
        "200":
          description: Trending mezmurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Mezmur"
  /mezmurs/{id}:
    get:
      operationId: getMezmur
      tags: [mezmurs]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Mezmur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mezmur"
    patch:
      operationId: updateMezmur
      tags: [mezmurs, admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMezmurBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mezmur"
    delete:
      operationId: deleteMezmur
      tags: [mezmurs, admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /mezmurs/{id}/play:
    post:
      operationId: incrementMezmurPlays
      tags: [mezmurs]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mezmur"

  /news:
    get:
      operationId: listNews
      tags: [news]
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
      responses:
        "200":
          description: News posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsPost"
    post:
      operationId: createNewsPost
      tags: [news, admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewsBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsPost"
  /news/latest:
    get:
      operationId: listLatestNews
      tags: [news]
      responses:
        "200":
          description: Latest news
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsPost"
  /news/{id}:
    get:
      operationId: getNewsPost
      tags: [news]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: News post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsPost"
    patch:
      operationId: updateNewsPost
      tags: [news, admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNewsBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsPost"
    delete:
      operationId: deleteNewsPost
      tags: [news, admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin+)
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: role, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 100, maximum: 500 } }
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }

  /admin/users/{id}:
    get:
      operationId: adminGetUser
      tags: [admin]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: User
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    patch:
      operationId: adminUpdateUser
      tags: [admin]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminUpdateUserBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    delete:
      operationId: adminDeleteUser
      tags: [admin]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

  /admin/audit:
    get:
      operationId: adminListAudit
      tags: [admin]
      summary: List audit log entries (admin+)
      parameters:
        - { name: actorId, in: query, schema: { type: integer } }
        - { name: action, in: query, schema: { type: string } }
        - { name: targetType, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 100, maximum: 500 } }
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditLogEntry" }

  /admin/analytics/overview:
    get:
      operationId: adminAnalyticsOverview
      tags: [admin]
      summary: Aggregated stats for the admin console
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminAnalytics" }

  /admin/system/settings:
    get:
      operationId: adminGetSystemSettings
      tags: [admin]
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SystemSetting" }
    patch:
      operationId: adminUpdateSystemSetting
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSystemSettingBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SystemSetting" }

  /qa/quizzes:
    get:
      operationId: qaListQuizzes
      tags: [qa]
      parameters:
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: category, schema: { type: string } }
        - { in: query, name: difficulty, schema: { type: string } }
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer } }
      responses:
        "200":
          description: List of quizzes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Quiz" }
    post:
      operationId: qaCreateQuiz
      tags: [qa]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateQuizBody" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quiz" }

  /qa/quizzes/by-code/{code}:
    get:
      operationId: qaGetQuizByCode
      tags: [qa]
      parameters:
        - { in: path, name: code, required: true, schema: { type: string } }
      responses:
        "200":
          description: Quiz
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quiz" }

  /qa/quizzes/{id}:
    get:
      operationId: qaGetQuiz
      tags: [qa]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Quiz with questions
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuizDetail" }
    patch:
      operationId: qaUpdateQuiz
      tags: [qa]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateQuizBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quiz" }
    delete:
      operationId: qaDeleteQuiz
      tags: [qa]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

  /qa/quizzes/{id}/questions:
    post:
      operationId: qaCreateQuestion
      tags: [qa]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateQuestionBody" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuizQuestion" }

  /qa/questions/{id}:
    patch:
      operationId: qaUpdateQuestion
      tags: [qa]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateQuestionBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuizQuestion" }
    delete:
      operationId: qaDeleteQuestion
      tags: [qa]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

  /qa/quizzes/{id}/start:
    post:
      operationId: qaStartAttempt
      tags: [qa]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Attempt started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttemptStart" }

  /qa/attempts/{id}/answer:
    post:
      operationId: qaSubmitAnswer
      tags: [qa]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmitAnswerBody" }
      responses:
        "200":
          description: Answer scored
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubmitAnswerResult" }

  /qa/attempts/{id}/finish:
    post:
      operationId: qaFinishAttempt
      tags: [qa]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Finished
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuizAttempt" }

  /qa/attempts/{id}:
    get:
      operationId: qaGetAttempt
      tags: [qa]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Attempt result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttemptResult" }

  /qa/me/attempts:
    get:
      operationId: qaListMyAttempts
      tags: [qa]
      parameters:
        - { in: query, name: limit, schema: { type: integer } }
      responses:
        "200":
          description: My attempts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QuizAttempt" }

  /qa/leaderboard:
    get:
      operationId: qaLeaderboard
      tags: [qa]
      parameters:
        - { in: query, name: window, schema: { type: string, enum: [today, week, month, all] } }
        - { in: query, name: limit, schema: { type: integer } }
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Leaderboard" }

  /qa/challenges:
    get:
      operationId: qaListChallenges
      tags: [qa]
      responses:
        "200":
          description: Active challenges
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QuizChallenge" }
    post:
      operationId: qaCreateChallenge
      tags: [qa]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateChallengeBody" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuizChallenge" }

  /qa/challenges/{id}:
    patch:
      operationId: qaUpdateChallenge
      tags: [qa]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateChallengeBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuizChallenge" }
    delete:
      operationId: qaDeleteChallenge
      tags: [qa]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    OkResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

